[include kiauh_macros.cfg]

[stepper_x]
step_pin: P2.2
dir_pin: P2.6
enable_pin: !P2.1
microsteps: 16
rotation_distance: 32
#endstop_pin: P1.29  # P1.28 for X-max
endstop_pin: P1.28
position_endstop: 0
position_max: 290
homing_speed: 100


[force_move]
enable_force_move: True

[stepper_y]
step_pin: P0.19
dir_pin: P0.20
enable_pin: !P2.8
microsteps: 16
rotation_distance: 32
#endstop_pin: P1.27  # P1.26 for Y-max
endstop_pin: P1.26
position_endstop: 200
position_max: 200
homing_speed: 100

[stepper_z]
step_pin: P0.22
dir_pin: !P2.11
enable_pin: !P0.21
microsteps: 16
rotation_distance: 8
#endstop_pin: P1.25  # P1.24 for Z-max
endstop_pin: probe:z_virtual_endstop
position_max: 300
position_min: -2
homing_speed: 100
#position_endstop: 0.5


[stepper_z1]
step_pin: P2.13
dir_pin: !P0.11
enable_pin: !P2.12
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
#position_max: 300
#position_min: 0
#position_endstop: 0.5

[probe]
pin: ^P1.24
#z_offset: 0.05
#   The distance (in mm) between the bed and the nozzle when the probe
#   triggers. This parameter must be provided.
speed: 250
samples: 3
sample_retract_dist: 5
speed: 20

[z_tilt]
z_positions:
    280,100
    5,100
points:
    280,100
    5,100
speed: 150
#horizontal_move_z: 5

[bed_mesh]
speed: 2000
horizontal_move_z: 5
mesh_min: 10,10
mesh_max: 260,190
probe_count: 26, 19
mesh_pps: 4,4    
fade_start: 1.0
fade_end: 10.0  
algorithm: bicubic 
bicubic_tension: 0.2 

[extruder]
step_pin: P0.1
dir_pin: P0.0
enable_pin: !P0.10
microsteps: 16
rotation_distance: 4.627
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: P2.7
sensor_type: EPCOS 100K B57560G104F
sensor_pin: P0.24
min_extrude_temp: 0
# Pressure advance @ PETG 0.6 nozzle
pressure_advance = 0.05
#control: pid
pid_kp = 30.921
pid_ki = 0.593
pid_kd = 185.338
min_temp: 0
max_temp: 280

[safe_z_home]
home_xy_position: 140,100 # Change coordinates to the center of your print bed
speed: 150
z_hop: 10                 # Move up 10mm
z_hop_speed: 15

#[extruder1]
#step_pin: P0.1
#dir_pin: P0.0
#enable_pin: !P0.10
#heater_pin: P2.4
#sensor_pin: P0.25
#...

[heater_bed]
heater_pin: P2.5
sensor_type: ATC Semitec 104GT-2
sensor_pin: P0.23
#control: pid
#pid_Kp: 22.2
#pid_Ki: 1.08
#pid_Kd: 114
min_temp: 0
max_temp: 120

[fan]
pin: P2.3

[mcu]
serial: /dev/serial/by-id/usb-Klipper_lpc1768_17150909090B56536D21054F040000F5-if00

#[mcu pico]
#serial: /dev/serial/by-id/usb-Klipper_rp2040_E6605481DB62B236-if00

#[adxl345]
#spi_bus: spi0a
#cs_pin: pico:gpio1

#[resonance_tester]
#accel_chip: adxl345
#probe_points:
#    140,100,50

[input_shaper]
shaper_freq_x: 112.0
shaper_type_x: ei
shaper_freq_y: 80.2
shaper_type_y: zv



[printer]
kinematics: corexy
max_velocity: 400
max_accel: 15000
max_z_velocity: 12
max_z_accel: 100

[virtual_sdcard]
path: /home/bksp/printer_data/gcodes

[gcode_macro START_PRINT]
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(210)|float %}
    # Wait for bed to reach temperature
    M104 S{EXTRUDER_TEMP}
    M190 S{BED_TEMP}
    # Use absolute coordinates
    G90
    
    
    # Home the printer
    G28
    # Move the nozzle near the bed
    G1 Z5 F3000
    # Move the nozzle very close to the bed
    #G1 Z0.1 F300
    # Set and wait for nozzle to reach temperature
    M109 S{EXTRUDER_TEMP}
    Z_TILT_ADJUST
    # Bed mesh
    BED_MESH_PROFILE LOAD=default



[gcode_macro END_PRINT]
gcode:
    # Turn off bed, extruder, and fan
    M140 S0
    M104 S0
    M106 S0
    # Move nozzle away from print while retracting
    G91
    G1 X-2 Y-2 E-3 F300
    # Raise nozzle by 10mm
    G1 Z50 F3000
    G90
    # Disable steppers
    M84


########################################
# TMC2208 configuration
########################################

# For TMC2208 UART
#   1) Remove all of the jumpers below the stepper drivers
#   2) Place jumpers on the red pin headers labeled XUART (XUART, YUART etc.)

[tmc2208 stepper_x]
uart_pin: P1.17
run_current: 0.800
stealthchop_threshold: 0

[tmc2208 stepper_y]
uart_pin: P1.15
run_current: 0.800
stealthchop_threshold: 0

[tmc2208 stepper_z]
uart_pin: P1.10
run_current: 0.650
stealthchop_threshold: 0

[tmc2208 stepper_z1]
uart_pin: P1.8
run_current: 0.650
stealthchop_threshold: 0

[tmc2208 extruder]
uart_pin: P1.1
run_current: 0.400
stealthchop_threshold: 0


